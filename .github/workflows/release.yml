name: Mosaic CI - Release

on:
  push:
    branches:
      - main
      - beta

permissions:
  id-token: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  release-beta:
    runs-on: ubuntu-22.04
    permissions:
      id-token: write
      contents: write
      deployments: write
      issues: read
      pages: write
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          persist-credentials: false

      - name: Install NodeJS
        uses: actions/setup-node@v3
        with:
          node-version: lts/krypton

      - name: Cache Dependencies
        id: cache-dependencies
        uses: actions/cache@v3
        env:
          cache-name: mosaic-dependencies
        with:
          path: node_modules
          key: mosaic-dependencies-${{ hashFiles('**/package-lock.json') }}

      - name: Install Dependencies
        if: steps.cache-dependencies.outputs.cache-hit != 'true'
        run: npm ci

      - name: Git Config
        run: |
          git config --local user.email "${{ secrets.GIT_USER_EMAIL }}"
          git config --local user.name "${{ secrets.GIT_USER_NAME }}"
          git pull

      - name: Run ESLint and Prettier
        id: code-format
        # save some time while debugging
        if: false
        run: |
          npm run clean:code
          git add .
          echo "formatted-files=$(git status -s -uno | wc -l)" >> $GITHUB_OUTPUT

      - name: Commit Format
        if: steps.code-format.outputs.formatted-files > 0
        run: |
          git commit -m "refactor: 💡 Clean code" -a

      - name: Generate Docs
        if: ${{ github.ref_name == 'main' }}
        run: npm run build:storybook

      - name: Generate Docs (Beta)
        if: ${{ github.ref_name == 'beta' }}
        run: npm run build:storybook:beta

      - name: Stage Docs
        id: generate-docs
        run: |
          git add .
          echo "generated-docs=$(git status -s -uno | wc -l)" >> $GITHUB_OUTPUT

      - name: Commit Docs
        if: steps.generate-docs.outputs.generated-docs > 0
        run: |
          git commit -m "docs: ✏️ Updated StoryBook" -a

      - name: Test runner
        if: ${{ github.ref_name == 'main' }}
        run: |
          npx playwright install --with-deps
          npx concurrently -k -s first -n "SB,TEST" -c "magenta,blue" \
            "npx http-server docs/latest --port 6006 --silent" \
            "npx wait-on tcp:127.0.0.1:6006 && npm run test:ci"

      - name: Test runner (Beta)
        if: ${{ github.ref_name == 'beta' }}
        run: |
          npx playwright install --with-deps
          npx concurrently -k -s first -n "SB,TEST" -c "magenta,blue" \
            "npx http-server docs/beta --port 6006 --silent" \
            "npx wait-on tcp:127.0.0.1:6006 && npm run test:ci"

      - name: Stage Database
        id: test-runner
        run: |
          git add .
          echo "components-db=$(git status -s -uno | wc -l)" >> $GITHUB_OUTPUT

      - name: Commit Database
        if: steps.test-runner.outputs.components-db > 0
        run: |
          git commit -m "docs: ✏️ Updated components database"

      - name: Build
        run: npm run build

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
        run: npx semantic-release --debug
